<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Collage Website</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #111827, #1f2937);
      color: #f9fafb;
      min-height: 100vh;
      padding: 24px;
    }

    .container {
      max-width: 1200px;
      margin: auto;
    }

    .hero {
      text-align: center;
      padding: 30px 0 20px;
    }

    .hero h1 {
      margin: 0 0 10px;
      font-size: 2.4rem;
      letter-spacing: 1px;
    }

    .hero p {
      margin: 0;
      color: #d1d5db;
      font-size: 1rem;
    }

    .collage {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
      margin-top: 20px;
    }

    .card {
      position: relative;
      overflow: hidden;
      border-radius: 16px;
      min-height: 220px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.25);
      transition: transform 0.3s ease;
    }

    .card:hover {
      transform: translateY(-5px) scale(1.01);
    }

    .card img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, transparent, rgba(0,0,0,0.75));
      display: flex;
      align-items: flex-end;
      padding: 16px;
    }

    .overlay h3 {
      margin: 0;
      font-size: 1.1rem;
    }

    .card.large { grid-column: span 2; grid-row: span 2; min-height: 460px; }
    .card.tall { grid-row: span 2; }

    @media (max-width: 768px) {
      .collage {
        grid-template-columns: 1fr 1fr;
      }
      .card.large {
        grid-column: span 2;
      }
    }

    @media (max-width: 480px) {
      .collage {
        grid-template-columns: 1fr;
      }
      .card.large, .card.tall {
        grid-column: span 1;
        grid-row: span 1;
      }
      .card.large { min-height: 260px; }
    }
  </style>
</head>
<body>
  <div class="container">
    <section class="hero">
      <h1>Creative Collage Showcase</h1>
      <p>A beautiful inline-CSS gallery with layered images and elegant design.</p>
    </section>

    <section class="collage">
      <div class="card large">
        <img src="https://images.unsplash.com/photo-1492691527719-9d1e07e534b4?auto=format&fit=crop&w=900&q=80" alt="City view" />
        <div class="overlay"><h3>Urban Nights</h3></div>
      </div>

      <div class="card">
        <img src="https://images.unsplash.com/photo-1500530855697-b586d89ba3ee?auto=format&fit=crop&w=600&q=80" alt="Mountain view" />
        <div class="overlay"><h3>Mountain Escape</h3></div>
      </div>

      <div class="card tall">
        <img src="https://images.unsplash.com/photo-1519681393784-d120267933ba?auto=format&fit=crop&w=600&q=80" alt="Ocean view" />
        <div class="overlay"><h3>Ocean Breeze</h3></div>
      </div>

      <div class="card">
        <img src="https://images.unsplash.com/photo-1493246507139-91e8fad9978e?auto=format&fit=crop&w=600&q=80" alt="Desert road" />
        <div class="overlay"><h3>Desert Road</h3></div>
      </div>

      <div class="card">
        <img src="https://images.unsplash.com/photo-1501785888041-af3ef285b470?auto=format&fit=crop&w=600&q=80" alt="Forest trail" />
        <div class="overlay"><h3>Forest Trail</h3></div>
      </div>
    </section>
  </div>
</body>
</html>
